name: Deploy Nuxt site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          # Facciamo gestire l'installazione direttamente all'action
          # Questo evita conflitti di ambiente e problemi di "packages field missing"
          run_install: |
            - args: [--no-frozen-lockfile]

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Non usiamo cache: pnpm qui, l'azione sopra è più efficiente

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: nuxt

      - name: Generate static site
        # Se pnpm install è andato bene sopra, ora generiamo il sito
        run: pnpm run generate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5